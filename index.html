<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Auditorias CRC — CFC 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- =====================================================================
     FIREBASE SDK  (versão compat — funciona sem build/npm)
     Documentação: https://firebase.google.com/docs/web/setup
     ===================================================================== -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
/* ==========================================================================
   VARIÁVEIS GLOBAIS
   ========================================================================== */
:root {
  --navy:   #003366;
  --blue:   #004B8D;
  --light:  #0067C5;

  --gold:   #C8A951;
  --gold2:  #E8C96A;

  --offwhite: #F4F6FA;
  --gray:     #E8EDF4;

  /* Cores de status */
  --s-and: #0067C5;  /* em andamento */
  --s-at:  #C0392B;  /* atrasada */
  --s-px:  #C8A951;  /* prazo próximo */
  --s-ok:  #1A7A4A;  /* concluída */
  --s-ag:  #6B7A99;  /* aguardando */

  /* Cores por etapa */
  --e1: #0067C5;
  --e2: #C8A951;
  --e3: #1A7A4A;

  /* Layout */
  --r:  6px;
  --rm: 10px;

  /* Sombras */
  --sh1: 0 1px 4px rgba(0,51,102,.10);
  --sh2: 0 4px 18px rgba(0,51,102,.13);
  --sh3: 0 8px 36px rgba(0,51,102,.18);

  /* Fontes */
  --f: 'Barlow', sans-serif;
  --m: 'JetBrains Mono', monospace;
  --c: 'Barlow Condensed', sans-serif;
}

/* ==========================================================================
   RESET & BASE
   ========================================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--f); background: var(--offwhite); color: var(--navy); min-height: 100vh; }
input, select, button, textarea { font-family: inherit; }

/* ==========================================================================
   BARRA SUPERIOR (TOPBAR)
   ========================================================================== */
.topbar { background: var(--navy); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 52px; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.25); }
.topbar-brand { display: flex; align-items: center; gap: 12px; }
.topbar-logo { width: 36px; height: 36px; border-radius: 4px; background: var(--gold); display: flex; align-items: center; justify-content: center; font-family: var(--c); font-size: 13px; font-weight: 800; color: var(--navy); flex-shrink: 0; }
.topbar-name { color: #fff; font-family: var(--c); font-size: 16px; font-weight: 700; letter-spacing: .04em; }
.topbar-name span { color: var(--gold); }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.topbar-year { font-family: var(--m); font-size: 12px; color: rgba(255,255,255,.45); border: 1px solid rgba(255,255,255,.12); padding: 3px 10px; border-radius: 20px; }
.btn-notify { background: var(--gold); color: var(--navy); border: none; padding: 7px 16px; border-radius: var(--r); font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; letter-spacing: .03em; transition: background .2s, transform .15s; }
.btn-notify:hover { background: var(--gold2); transform: translateY(-1px); }

/* Indicador de status da conexão Firebase */
.fb-status { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.fb-dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; transition: background .3s; }
.fb-dot.connected { background: #10b981; }
.fb-dot.error { background: #ef4444; }

/* ==========================================================================
   LAYOUT PRINCIPAL (sidebar + conteúdo)
   ========================================================================== */
.app-layout { display: flex; min-height: calc(100vh - 52px); }

/* ==========================================================================
   SIDEBAR
   ========================================================================== */
.sidebar { width: 220px; background: var(--navy); flex-shrink: 0; display: flex; flex-direction: column; padding: 20px 0; border-right: 1px solid rgba(255,255,255,.07); }
.sidebar-section { padding: 0 16px; margin-bottom: 24px; }
.sidebar-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; padding: 0 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--r); cursor: pointer; color: rgba(255,255,255,.6); font-size: 13px; font-weight: 500; transition: all .15s; margin-bottom: 2px; }
.nav-item:hover { background: rgba(255,255,255,.07); color: #fff; }
.nav-item.active { background: rgba(200,169,81,.18); color: var(--gold); }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: .8; }
.nav-item.active svg { opacity: 1; }
.sidebar-divider { height: 1px; background: rgba(255,255,255,.08); margin: 8px 16px 16px; }

/* Filtros na sidebar */
.sidebar-filter { padding: 0 16px; }
.filter-group { margin-bottom: 16px; }
.filter-group label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.3); text-transform: uppercase; letter-spacing: .08em; display: block; margin-bottom: 6px; }
.filter-select { width: 100%; padding: 8px 10px; border-radius: var(--r); border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.07); color: rgba(255,255,255,.8); font-size: 12px; cursor: pointer; outline: none; }
.filter-select:focus { border-color: var(--gold); }
.filter-select option { background: #1a2a44; color: #fff; }
.search-input-sb { width: 100%; padding: 8px 10px 8px 32px; border-radius: var(--r); border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.07); color: rgba(255,255,255,.8); font-size: 12px; outline: none; }
.search-input-sb:focus { border-color: var(--gold); }
.search-input-sb::placeholder { color: rgba(255,255,255,.3); }
.search-wrap-sb { position: relative; }
.search-wrap-sb svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,.3); width: 13px; height: 13px; pointer-events: none; }
.btn-reset-sb { width: 100%; padding: 7px; border-radius: var(--r); border: 1px solid rgba(255,255,255,.12); background: transparent; color: rgba(255,255,255,.4); font-size: 11px; cursor: pointer; font-weight: 600; letter-spacing: .04em; transition: all .15s; margin-top: 4px; }
.btn-reset-sb:hover { background: rgba(255,255,255,.07); color: rgba(255,255,255,.7); }

/* ==========================================================================
   ÁREA DE CONTEÚDO PRINCIPAL
   ========================================================================== */
.main-content { flex: 1; overflow: auto; display: flex; flex-direction: column; }
.page-header { background: #fff; border-bottom: 1px solid var(--gray); padding: 20px 28px 16px; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.page-header h1 { font-family: var(--c); font-size: 24px; font-weight: 800; color: var(--navy); letter-spacing: .01em; margin-bottom: 2px; }
.page-header p { font-size: 12px; color: var(--s-ag); }
.btn-export { padding: 8px 16px; border-radius: var(--r); border: 1px solid var(--gray); background: #fff; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--navy); display: flex; align-items: center; gap: 6px; transition: all .15s; }
.btn-export:hover { background: var(--offwhite); border-color: var(--blue); }

/* ==========================================================================
   FAIXA DE ESTATÍSTICAS
   ========================================================================== */
.stats-strip { display: grid; grid-template-columns: repeat(6, 1fr); background: #fff; border-bottom: 1px solid var(--gray); }
.stat-tile { padding: 14px 20px; border-right: 1px solid var(--gray); position: relative; overflow: hidden; transition: background .15s; cursor: pointer; }
.stat-tile:last-child { border-right: none; }
.stat-tile::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--tc); }
.stat-tile:hover { background: var(--offwhite); }
.stat-label { font-size: 10px; font-weight: 700; color: var(--s-ag); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
.stat-value { font-family: var(--m); font-size: 26px; font-weight: 600; color: var(--tc); line-height: 1; }
.stat-sub { font-size: 10px; color: var(--s-ag); margin-top: 3px; }

/* ==========================================================================
   ÁREA DE KPIs (barras por responsável + donut de status)
   ========================================================================== */
.kpi-area { padding: 16px 28px; background: #fff; border-bottom: 1px solid var(--gray); display: flex; gap: 24px; align-items: flex-start; }
.kpi-block { flex: 1; }
.kpi-title { font-size: 11px; font-weight: 700; color: var(--s-ag); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; }
.kpi-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.kpi-bar-name { font-size: 11px; font-weight: 600; color: var(--navy); width: 56px; flex-shrink: 0; }
.kpi-bar-track { flex: 1; height: 8px; background: var(--gray); border-radius: 4px; overflow: hidden; }
.kpi-bar-fill { height: 100%; border-radius: 4px; transition: width .5s; }
.kpi-bar-pct { font-family: var(--m); font-size: 10px; color: var(--s-ag); width: 36px; text-align: right; }
.kpi-donut { width: 200px; flex-shrink: 0; }
.kpi-legend { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
.kpi-legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; }
.kpi-legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

/* ==========================================================================
   GRID DE CARDS
   ========================================================================== */
.cards-area { padding: 20px 28px 36px; flex: 1; }
.cards-area-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cards-area-title { font-family: var(--c); font-size: 14px; font-weight: 700; color: var(--s-ag); text-transform: uppercase; letter-spacing: .07em; }
.view-toggle { display: flex; gap: 4px; }
.view-btn { width: 30px; height: 30px; border-radius: var(--r); border: 1px solid var(--gray); background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--s-ag); transition: all .15s; }
.view-btn.active, .view-btn:hover { background: var(--navy); color: #fff; border-color: var(--navy); }
.view-btn svg { width: 14px; height: 14px; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
.cards-grid.lv { grid-template-columns: 1fr; }

/* Card individual de auditoria */
.audit-card { background: #fff; border-radius: var(--rm); padding: 16px 18px; border: 1px solid var(--gray); cursor: pointer; box-shadow: var(--sh1); transition: transform .18s, box-shadow .18s, border-color .18s; position: relative; overflow: hidden; }
.audit-card:hover { transform: translateY(-2px); box-shadow: var(--sh2); border-color: #b8c8e0; }
.audit-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--ca); }
.card-hd { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.card-unit { font-family: var(--c); font-size: 20px; font-weight: 800; color: var(--navy); }
.card-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
.meta-tag { font-size: 10px; color: var(--s-ag); background: var(--offwhite); padding: 2px 8px; border-radius: 20px; border: 1px solid var(--gray); display: flex; align-items: center; gap: 4px; font-weight: 500; }
.sbadge { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 20px; white-space: nowrap; letter-spacing: .04em; flex-shrink: 0; }
.prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.prog-label { font-size: 11px; color: var(--s-ag); font-weight: 500; }
.prog-count { font-family: var(--m); font-size: 11px; font-weight: 600; color: var(--navy); }
.prog-track { height: 5px; background: var(--gray); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
.prog-fill { height: 100%; border-radius: 3px; transition: width .4s; }
.etapas-row { display: flex; gap: 5px; }
.ec { flex: 1; padding: 4px 6px; border-radius: 4px; font-size: 9px; text-align: center; font-weight: 600; border: 1px solid var(--gray); color: var(--s-ag); background: var(--offwhite); letter-spacing: .03em; text-transform: uppercase; }
.ec.done { background: #eafaf2; border-color: #a8d8bc; color: var(--e3); }
.ec.active { border-width: 1.5px; }
.dl-warn { position: absolute; top: 14px; right: 14px; font-size: 9px; font-weight: 700; color: #7a4a00; background: #fff3cd; border: 1px solid #f0c040; border-radius: 20px; padding: 2px 7px; letter-spacing: .04em; }

/* ==========================================================================
   TELA DE DETALHE (checklist)
   ========================================================================== */
.detail-topbar { background: var(--navy); padding: 16px 28px; color: #fff; display: flex; align-items: center; gap: 16px; border-bottom: 3px solid var(--gold); }
.btn-back { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); border-radius: var(--r); padding: 7px 14px; color: #fff; cursor: pointer; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: background .15s; font-family: var(--f); flex-shrink: 0; }
.btn-back:hover { background: rgba(255,255,255,.18); }
.detail-info { flex: 1; }
.detail-unit { font-family: var(--c); font-size: 28px; font-weight: 800; }
.detail-meta { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
.detail-pct-block { text-align: right; flex-shrink: 0; }
.detail-pct { font-family: var(--m); font-size: 38px; font-weight: 600; color: var(--gold); line-height: 1; }
.detail-pct-sub { font-size: 11px; opacity: .5; margin-top: 2px; }
.detail-prog { margin: 14px 28px 0; height: 6px; background: rgba(255,255,255,.12); border-radius: 3px; overflow: hidden; }
.detail-prog-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--light), var(--gold)); transition: width .5s; }

/* Cards de período de cada etapa */
.periods-area { padding: 16px 28px 0; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.period-card { background: #fff; border-radius: var(--rm); padding: 14px 16px; border: 1.5px solid var(--gray); box-shadow: var(--sh1); }
.period-card.active { border-color: var(--eac); }
.period-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.period-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.period-name { font-size: 12px; font-weight: 700; flex: 1; }
.period-dates { font-size: 12px; color: var(--s-ag); display: flex; align-items: center; gap: 5px; }
.edit-btn { background: none; border: none; cursor: pointer; color: var(--s-ag); padding: 3px; border-radius: 4px; display: flex; align-items: center; transition: all .15s; }
.edit-btn:hover { color: var(--blue); background: var(--offwhite); }
.period-warn { margin-top: 7px; font-size: 10px; color: #7a4a00; background: #fff8e6; border: 1px solid #f0c040; border-radius: 4px; padding: 4px 8px; display: flex; align-items: center; gap: 5px; font-weight: 600; }

/* Checklist de tarefas */
.checklist-area { padding: 16px 28px 40px; }
.etapa-sec { margin-bottom: 20px; }
.etapa-hd-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.etapa-pill { font-family: var(--c); font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 3px; color: #fff; letter-spacing: .06em; }
.etapa-title { font-size: 14px; font-weight: 700; color: var(--navy); }
.etapa-prog { font-family: var(--m); font-size: 11px; color: var(--s-ag); }
.task-list { display: flex; flex-direction: column; gap: 3px; }
.task-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-radius: 8px; border: 1px solid var(--gray); background: var(--offwhite); transition: all .15s; cursor: not-allowed; opacity: .45; }
.task-row.done { opacity: 1; }
.task-row.can-do { cursor: pointer; opacity: 1; }
.task-row.can-do:hover { transform: translateX(4px); box-shadow: var(--sh1); }
.task-row.next { background: #fff; border-width: 1.5px; opacity: 1; }
.task-check { width: 20px; height: 20px; border-radius: 5px; border: 2px solid var(--gray); background: #fff; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #fff; }
.task-text { flex: 1; font-size: 13px; color: var(--navy); font-weight: 400; }
.task-row.done .task-text { text-decoration: line-through; color: var(--s-ag); font-weight: 500; }
.task-row.next .task-text { font-weight: 600; }
.task-badge-next { font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 20px; letter-spacing: .05em; flex-shrink: 0; }
.task-locked { font-size: 10px; color: var(--s-ag); flex-shrink: 0; }

/* ==========================================================================
   MODAIS (editar prazo + notificações)
   ========================================================================== */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; animation: fadeIn .15s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal { background: #fff; border-radius: var(--rm); padding: 28px; max-width: 460px; width: 100%; box-shadow: var(--sh3); animation: slideUp .2s ease; border-top: 4px solid var(--gold); }
@keyframes slideUp { from { transform: translateY(14px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-title { font-family: var(--c); font-size: 20px; font-weight: 800; color: var(--navy); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.modal-sub { font-size: 12px; color: var(--s-ag); margin-bottom: 20px; }
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 11px; font-weight: 700; color: var(--navy); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
.modal-input { width: 100%; padding: 9px 12px; border-radius: var(--r); border: 1.5px solid var(--gray); font-size: 13px; outline: none; font-family: var(--f); color: var(--navy); transition: border-color .15s; }
.modal-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,75,141,.1); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.btn-cancel { padding: 9px 18px; border-radius: var(--r); border: 1.5px solid var(--gray); background: #fff; font-size: 13px; cursor: pointer; color: var(--s-ag); font-weight: 600; transition: all .15s; }
.btn-cancel:hover { background: var(--offwhite); }
.btn-save { padding: 9px 20px; border-radius: var(--r); border: none; background: var(--navy); font-size: 13px; cursor: pointer; color: #fff; font-weight: 700; transition: background .15s; }
.btn-save:hover { background: var(--blue); }

/* Modal de notificações */
.notify-modal { max-width: 540px; }
.notif-sec { margin-bottom: 18px; }
.notif-sec-title { font-size: 11px; font-weight: 700; color: var(--s-ag); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--gray); }
.email-list { display: flex; flex-direction: column; gap: 5px; }
.email-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: 1px solid var(--gray); border-radius: var(--r); background: var(--offwhite); }
.email-item-addr { flex: 1; font-size: 13px; color: var(--navy); }
.email-item-rm { background: none; border: none; cursor: pointer; color: var(--s-ag); padding: 2px 5px; border-radius: 4px; font-size: 16px; line-height: 1; transition: all .15s; }
.email-item-rm:hover { color: var(--s-at); background: #fee; }
.add-email-row { display: flex; gap: 8px; margin-top: 8px; }
.add-email-inp { flex: 1; padding: 8px 12px; border-radius: var(--r); border: 1.5px solid var(--gray); font-size: 13px; outline: none; font-family: var(--f); }
.add-email-inp:focus { border-color: var(--blue); }
.btn-add-email { padding: 8px 14px; border-radius: var(--r); border: none; background: var(--navy); color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: background .15s; }
.btn-add-email:hover { background: var(--blue); }
.days-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.day-chip { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--gray); background: #fff; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--s-ag); transition: all .15s; font-family: var(--m); }
.day-chip.sel { background: var(--navy); color: var(--gold); border-color: var(--navy); }
.notif-preview { background: #f0f5ff; border: 1px solid #c0d0ee; border-radius: var(--r); padding: 12px 14px; margin-top: 8px; }
.notif-preview-title { font-size: 11px; font-weight: 700; color: var(--blue); margin-bottom: 6px; }
.notif-preview-body { font-size: 12px; color: var(--navy); line-height: 1.6; }
.notif-log { max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
.log-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--r); font-size: 11px; }
.log-item.sent { background: #eafaf2; color: var(--e3); }
.log-item-time { font-family: var(--m); font-size: 10px; opacity: .7; margin-left: auto; }

/* ==========================================================================
   TOAST (notificação temporária no canto da tela)
   ========================================================================== */
.toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; background: var(--navy); color: #fff; padding: 12px 20px; border-radius: var(--rm); font-size: 13px; font-weight: 600; box-shadow: var(--sh3); border-left: 4px solid var(--gold); animation: toastIn .3s ease; display: flex; align-items: center; gap: 8px; }
@keyframes toastIn { from { transform: translateY(16px); opacity: 0; } to { transform: none; opacity: 1; } }

/* Estado vazio (sem resultados) */
.empty-state { grid-column: 1/-1; text-align: center; padding: 56px 20px; color: var(--s-ag); }

/* ==========================================================================
   RESPONSIVO
   ========================================================================== */

      NS = cfgSnap.data();

      NL = logSnap.data().items || [];

    // qualquer usuário faz uma alteração no banco

      audits = snapshot.docs.map(d => d.data());

// Encontra uma auditoria pelo ID
function fa(id) { return audits.find(a => a.id === id); }

// Escapa HTML para evitar injeção (segurança)
function esc(t) { const d = document.createElement("div"); d.textContent = String(t); return d.innerHTML; }

// Converte "DD/MM/AAAA" para objeto Date
function pdb(s) { const [d, m, y] = s.trim().split("/"); return new Date(+y, +m - 1, +d); }

// Extrai data de fim de um período "DD/MM a DD/MM"
function pend(ps)   { return pdb(ps.split(" a ")[1]); }
function pstart(ps) { return pdb(ps.split(" a ")[0]); }

// Calcula dias restantes até uma data (negativo = atrasado)
function du(dt) {
  const n = new Date(); n.setHours(0, 0, 0, 0);
  return Math.round((dt - n) / 86400000);
}

/* ============================================================================
   SEÇÃO 9 — LÓGICA DE STATUS E PROGRESSO
   ========================================================================= */

// Retorna o número da etapa atual (1, 2 ou 3)
function getCE(a) {
  if (a.c.length === 26) return 4;
  const last = a.c.length ? Math.max(...a.c) : 0;
  const t = TAREFAS.find(x => x.id === last + 1);
  return t ? t.e : 1;
}

// Retorna prazo da etapa atual com dias restantes
function getAD(a) {
  const et = getCE(a); if (et > 3) return null;
  const end = pend(a["p" + et]); const days = du(end);
  return { etapa: et, end, days, period: a["p" + et] };
}

// Retorna o status de uma auditoria
// Possíveis valores: concluida | atrasada | proxima | em_andamento | aguardando
function getSt(a) {
  if (a.c.length === 26) return "concluida";
  const dl = getAD(a); if (!dl) return "concluida";
  if (dl.days < 0) return "atrasada";
  if (dl.days <= 7) return "proxima";
  if (du(pstart(a["p" + dl.etapa])) <= 0) return "em_andamento";
  return "aguardando";
}

// Labels e cores por status
const SL = { concluida: "Concluída", atrasada: "Atrasada", proxima: "Prazo Próximo", em_andamento: "Em Andamento", aguardando: "Aguardando" };
const SC = { concluida: "#1A7A4A", atrasada: "#C0392B", proxima: "#7a4a00", em_andamento: "#0067C5", aguardando: "#6B7A99" };
const SB = { concluida: "#eafaf2", atrasada: "#fde8e6", proxima: "#fff8e6", em_andamento: "#e8f1fb", aguardando: "#f0f2f8" };

// Calcula totais para a faixa de estatísticas
function stats() {
  const s = { total: audits.length, concluida: 0, atrasada: 0, proxima: 0, em_andamento: 0, aguardando: 0, avg: 0 };
  audits.forEach(a => { s[getSt(a)]++; s.avg += a.c.length; });
  s.avg = Math.round((s.avg / (audits.length * 26)) * 100);
  return s;
}

// Agrupa progresso por responsável (para o gráfico de barras)
function byResp() {
  const rs = [...new Set(audits.map(a => a.r))];
  return rs.map(r => {
    const g = audits.filter(a => a.r === r);
    const t = g.reduce((s, a) => s + a.c.length, 0);
    return { name: r, pct: Math.round((t / (g.length * 26)) * 100), count: g.length };
  }).sort((a, b) => b.pct - a.pct);
}

// Filtra auditorias conforme os filtros ativos na sidebar
function filtered() {
  return audits.filter(a => {
    if (fResp !== "Todos" && a.r !== fResp) return false;
    if (fFmt !== "Todos"  && a.f !== fFmt)  return false;
    if (fSt  !== "Todos"  && getSt(a) !== fSt) return false;
    if (srch && !a.u.toLowerCase().includes(srch.toLowerCase())) return false;
    return true;
  });
}

// Marca ou desmarca uma tarefa no checklist
// Ao desmarcar, todas as tarefas subsequentes também são desmarcadas
async function toggleTarefa(aid, tid) {
  const a = fa(aid); if (!a) return;
  const idx = a.c.indexOf(tid);
  if (idx >= 0) {
    a.c = a.c.filter(id => id < tid);
  } else {
    const ap = TAREFAS.filter(t => t.id < tid).map(t => t.id);
    if (ap.every(id => a.c.includes(id))) {
      a.c.push(tid);
      a.c.sort((x, y) => x - y);
    }
  }
  render();
  await saveAudit(a);
}

/* ============================================================================
   SEÇÃO 11 — SISTEMA DE NOTIFICAÇÕES POR E-MAIL
   Nota: este sistema registra os alertas localmente e exibe no log.
   Para envio real de e-mails, integre com Firebase Cloud Functions +
   SendGrid ou similar.
   ========================================================================= */

async function sendEmail(toEmail, subject, body) {
  try {
    await emailjs.send(EJS.serviceId, EJS.templateId, {
      to_email: toEmail,
      subject:  subject,
      message:  body,
    });
    return true;
  } catch (err) {
    console.error("EmailJS erro:", err);
    return false;
  }
}

async function checkNotifs() {
  if (!NS.emails.length) return;
  const now = new Date();
  const ds = now.toLocaleDateString("pt-BR");
  const ts = now.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });

  const alertas = [];

  audits.forEach(a => {
    if (a.c.length === 26) return;
    const dl = getAD(a); if (!dl) return;

    NS.alertDays.forEach(d => {
      if (dl.days === d) {
        const key = `notif_${a.u}_e${dl.etapa}_d${d}_${ds}`;
        if (!NL.find(l => l.key === key)) {
          alertas.push({ key, message: `${a.u} — Etapa ${dl.etapa} (${EN[dl.etapa]}): ${d} dia(s) para o prazo`, tipo: "prazo" });
        }
      }
    });

    if (dl.days < 0) {
      const key = `atrasada_${a.u}_e${dl.etapa}_${ds}`;
      if (!NL.find(l => l.key === key)) {
        alertas.push({ key, message: `${a.u} — Etapa ${dl.etapa} (${EN[dl.etapa]}): ${Math.abs(dl.days)} dia(s) de atraso`, tipo: "atraso" });
      }
    }
  });

  if (!alertas.length) return;

  const linhas = alertas.map(a => `• ${a.message}`).join("\n");
  const subject = `⚠ Alerta de Prazos — Auditorias CRC 2026 | CFC`;
  const body = `Olá,\n\nOs seguintes alertas foram identificados no sistema de Gestão de Auditorias CRC 2026:\n\n${linhas}\n\nAcesse o sistema para verificar os detalhes.\n\n— Sistema de Gestão de Auditorias | CFC 2026`;

  let sent = 0;
  for (const email of NS.emails) {
    const ok = await sendEmail(email, subject, body);
    if (ok) sent++;
  }

  if (sent > 0) {
    alertas.forEach(a => {
      NL.unshift({ key: a.key, message: a.message, to: NS.emails.join(", "), datetime: `${ds} ${ts}`, status: "sent" });
    });
    if (NL.length > 50) NL = NL.slice(0, 50);
    saveNotifConfig();
    showToast(`📧 ${alertas.length} alerta(s) enviado(s) por e-mail`);
  }
}

function addEmail() {
  const inp = document.getElementById("nei"); if (!inp) return;
  const v = inp.value.trim();
  if (!v || !/\S+@\S+\.\S+/.test(v)) { showToast("⚠ E-mail inválido"); return; }
  if (NS.emails.includes(v)) { showToast("⚠ Já cadastrado"); return; }
  NS.emails.push(v); inp.value = ""; saveNotifConfig(); render();
}
function removeEmail(e) { NS.emails = NS.emails.filter(x => x !== e); saveNotifConfig(); render(); }
function toggleDay(d) {
  const i = NS.alertDays.indexOf(d);
  if (i >= 0) NS.alertDays.splice(i, 1); else NS.alertDays.push(d);
  NS.alertDays.sort((a, b) => b - a); saveNotifConfig(); render();
}
function saveNotify() { modal = null; checkNotifs(); render(); showToast("✓ Notificações configuradas"); }
async function testEmail() {
  if (!NS.emails.length) { showToast("⚠ Adicione ao menos um e-mail"); return; }
  showToast("📧 Enviando e-mail de teste...");
  const subject = "✅ Teste — Sistema de Auditorias CRC 2026 | CFC";
  const body = `Olá,\n\nEste é um e-mail de teste do Sistema de Gestão de Auditorias CRC 2026.\n\nSe você recebeu esta mensagem, a integração está funcionando corretamente.\n\nDestinatários configurados: ${NS.emails.join(", ")}\nAntecedência de alertas: ${NS.alertDays.join(", ")} dias\n\n— Sistema de Gestão de Auditorias | CFC 2026`;
  let ok = 0;
  for (const email of NS.emails) {
    const sent = await sendEmail(email, subject, body);
    if (sent) ok++;
  }
  const now = new Date();
  NL.unshift({ key: `test_${Date.now()}`, message: "E-mail de teste enviado", to: NS.emails.join(", "), datetime: now.toLocaleDateString("pt-BR") + " " + now.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" }), status: "sent" });
  saveNotifConfig(); render();
  showToast(ok > 0 ? "✅ E-mail de teste enviado com sucesso!" : "⚠ Falha ao enviar — verifique o EmailJS");
}

function exportCSV() {
  const rows = [["Unidade", "Responsável", "Formato", "Status", "Progresso (%)", "Etapa Atual", "Prazo Fim", "Dias Restantes"]];
  audits.forEach(a => {
    const st = getSt(a); const et = getCE(a); const dl = getAD(a);
    rows.push([a.u, a.r, a.f, SL[st], Math.round(a.c.length / 26 * 100), et > 3 ? "Concluída" : `Etapa ${et}: ${EN[et]}`, dl ? dl.period.split(" a ")[1] : "—", dl ? dl.days : "—"]);
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "auditorias_crc_2026.csv"; a.click(); URL.revokeObjectURL(a.href);
  showToast("✓ CSV exportado com sucesso");
}

// Donut chart de distribuição por status
function donut(statuses, total) {
  if (!total) return "";
  const r = 36, cx = 50, cy = 50, sw = 14, circ = 2 * Math.PI * r;
  let off = 0, circles = "";
  statuses.forEach(s => {
    if (!s.count) return;
    const pct = s.count / total, dash = pct * circ, gap = circ - dash;
    circles += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${sw}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${circ * .25 - off}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off -= dash;
  });
  return `<svg viewBox="0 0 100 100" width="80" height="80" style="display:block;margin:0 auto 6px">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#E8EDF4" stroke-width="${sw}"/>
    ${circles}
    <text x="${cx}" y="${cy + 1}" text-anchor="middle" dominant-baseline="middle" style="font-size:13px;font-weight:700;font-family:JetBrains Mono,monospace;fill:#003366">${total}</text>
  </svg>`;
}

          <div class="notif-preview-body">Olá,<br><br>Existem <b>${pend} auditoria(s)</b> com prazo próximo.<br>Destinatários: <b>${NS.emails.length > 0 ? NS.emails.join(", ") : "(nenhum)"}</b><br><br><i>Sistema de Gestão de Auditorias — CFC 2026.</i></div>
        </div>
      </div>
      ${NL.length > 0 ? `<div class="notif-sec">
        <div class="notif-sec-title">Histórico de Envios</div>
        <div class="notif-log">
          ${NL.slice(0, 8).map(l => `<div class="log-item sent">${ico("mail")}<span style="flex:1">${esc(l.message)}</span><span class="log-item-time">${esc(l.datetime)}</span></div>`).join("")}
        </div>
      </div>` : ""}
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Fechar</button>
        <button class="btn-cancel" style="color:#0067C5;border-color:#0067C5" onclick="testEmail()">📧 Teste</button>
        <button class="btn-save" onclick="saveNotify()">Salvar</button>
      </div>
    </div>
  </div>`;
}

/* ============================================================================
   SEÇÃO 15 — RENDERIZAÇÃO PRINCIPAL
   Duas views: dashboard (lista de cards) e detalhe (checklist de uma auditoria)
   ========================================================================= */

// Renderiza a tela de detalhe de uma auditoria
function renderDetail(app) {
  const a = fa(selId); if (!a) { selId = null; render(); return; }
  const st = getSt(a); const pct = Math.round((a.c.length / 26) * 100); const et = getCE(a);

  app.innerHTML = topbar() + `<div style="flex:1;overflow:auto">
    <div class="detail-topbar">
      <button class="btn-back" onclick="selId=null;render()">${ico("back")} Voltar</button>
      <div class="detail-info">
        <div class="detail-unit">${esc(a.u)}</div>
        <div class="detail-meta">
          <span class="meta-tag" style="border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:rgba(255,255,255,.75)">${ico("user")} ${esc(a.r)}</span>
          <span class="meta-tag" style="border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:rgba(255,255,255,.75)">${ico("pin")} ${esc(a.f)}</span>
          <span class="sbadge" style="background:${SB[st]};color:${SC[st]}">${SL[st]}</span>
        </div>
      </div>
      <div class="detail-pct-block">
        <div class="detail-pct">${pct}%</div>
        <div class="detail-pct-sub">${a.c.length} de 26 tarefas</div>
      </div>
    </div>

    <div class="detail-prog">
      <div class="detail-prog-fill" style="width:${pct}%"></div>
    </div>

    <!-- Cards de período por etapa -->
    <div class="periods-area">
      ${[1, 2, 3].map(e => {
        const p = a["p" + e];
        const done   = e < et || a.c.length === 26;
        const active = e === Math.min(et, 3) && a.c.length < 26;
        const end  = pend(p); const days = du(end);
        const wm = active && days >= 0 && days <= 7
          ? `${days === 0 ? "Vence hoje" : `${days} dia(s) para o prazo`}`
          : (active && days < 0 ? `${Math.abs(days)} dia(s) de atraso` : "");
        return `<div class="period-card ${active ? "active" : ""}" style="${active ? `--eac:${EC[e]}` : ""}">
          <div class="period-hd">
            <div class="period-dot" style="background:${done ? "#1A7A4A" : active ? EC[e] : "#c8d0dc"}"></div>
            <span class="period-name" style="color:${EC[e]}">Etapa ${e}: ${EN[e]}</span>
            <button class="edit-btn" onclick="event.stopPropagation();openEP(${a.id},${e})">${ico("edit")}</button>
          </div>
          <div class="period-dates">${ico("clock")} ${esc(p)}</div>
          ${wm ? `<div class="period-warn">${ico("warn")} ${esc(wm)}</div>` : ""}
        </div>`;
      }).join("")}
    </div>

    <!-- Checklist de tarefas por etapa -->
    <div class="checklist-area">
      ${[1, 2, 3].map(e => {
        const tasks = TAREFAS.filter(t => t.e === e);
        const dc = tasks.filter(t => a.c.includes(t.id)).length;
        return `<div class="etapa-sec">
          <div class="etapa-hd-row">
            <span class="etapa-pill" style="background:${EC[e]}">ETAPA ${e}</span>
            <span class="etapa-title">${EN[e]}</span>
            <span class="etapa-prog">${dc}/${tasks.length}</span>
          </div>
          <div class="task-list">
            ${tasks.map(t => {
              const done  = a.c.includes(t.id);
              const ap    = TAREFAS.filter(x => x.id < t.id).map(x => x.id);
              const canDo = done || ap.every(id => a.c.includes(id));
              const isNext = !done && canDo;
              const locked = !done && !canDo;
              return `<div class="task-row ${done ? "done" : ""} ${canDo ? "can-do" : ""} ${isNext ? "next" : ""}"
                style="${done ? `background:${EB[e]};border-color:${EC[e]}30` : isNext ? `border-color:${EC[e]}` : ""}"
                ${canDo ? `onclick="toggleTarefa(${a.id},${t.id})"` : ""}
              >
                <div class="task-check" style="${done ? `background:${EC[e]};border:none` : `border-color:${locked ? "#c8d0dc" : EC[e]}`}">
                  ${done   ? `<span style="width:12px;height:12px;display:flex">${ico("check")}</span>` : ""}
                  ${locked ? `<span style="width:12px;height:12px;display:flex;opacity:.3">${ico("lock")}</span>` : ""}
                </div>
                <span class="task-text">${esc(t.id)}. ${esc(t.n)}</span>
                ${isNext  ? `<span class="task-badge-next" style="color:${EC[e]};background:${EB[e]}">PRÓXIMA</span>` : ""}
                ${locked  ? `<span class="task-locked">Bloqueada</span>` : ""}
              </div>`;
            }).join("")}
          </div>
        </div>`;
      }).join("")}
    </div>
  </div>
  ${modal === "ep"     ? epModal(a)    : ""}
  ${modal === "notify" ? notifyModal() : ""}`;
}

// Renderiza o dashboard principal
function renderDashboard(app) {
  const fl = filtered(); const st = stats();
  app.innerHTML = topbar() + `<div class="app-layout">
    ${sidebar()}
    <div class="main-content">
      <div class="page-header">
        <div>
          <h1>Dashboard de Auditorias</h1>
          <p>Conselho Federal de Contabilidade — Plano de Trabalho 2026 · ${new Date().toLocaleDateString("pt-BR", { day: "2-digit", month: "long", year: "numeric" })}</p>
        </div>
        <button class="btn-export" onclick="exportCSV()">${ico("export")} Exportar CSV</button>
      </div>
      ${statsStrip(st)}
      ${kpiArea(st)}
      <div class="cards-area">
        <div class="cards-area-hd">
          <span class="cards-area-title">${fl.length} auditoria${fl.length !== 1 ? "s" : ""}</span>
          <div class="view-toggle">
            <button class="view-btn ${!listView ? "active" : ""}" onclick="listView=false;render()" title="Grade">${ico("grid")}</button>
            <button class="view-btn ${listView  ? "active" : ""}" onclick="listView=true;render()"  title="Lista">${ico("rows")}</button>
          </div>
        </div>
        <div class="cards-grid ${listView ? "lv" : ""}">
          ${fl.length === 0
            ? `<div class="empty-state"><div style="font-size:36px;margin-bottom:10px">🔍</div><p>Nenhuma auditoria encontrada.</p></div>`
            : fl.map(a => card(a)).join("")}
        </div>
      </div>
    </div>
  </div>
  ${modal === "notify" ? notifyModal() : ""}`;
}

// Função principal de renderização — decide qual view mostrar
function render() {
  const app = document.getElementById("app");
  if (!app) return;
  if (selId) {
    renderDetail(app);
  } else {
    renderDashboard(app);
  }
}

/* ============================================================================
   SEÇÃO 16 — TOAST (mensagem temporária no canto da tela)
   ========================================================================= */

function showToast(msg) {
  const o = document.querySelector(".toast"); if (o) o.remove();
  const t = document.createElement("div");
  t.className = "toast";
  t.innerHTML = esc(msg);
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}
